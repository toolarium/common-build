name: CB Test

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  #######################################################################
  # Linux - core tests
  #######################################################################
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: chmod -R +x bin/

      - name: Install common-build
        run: |
          bash bin/cb-install
          CB_HOME=$(ls -d $HOME/devtools/toolarium-common-build-* | head -1)
          echo "CB_HOME=$CB_HOME" >> $GITHUB_ENV
          echo "$CB_HOME/bin" >> $GITHUB_PATH

      - name: Test --version
        run: |
          cb --version
          cb --version | grep -q "toolarium common build"

      - name: Test --help
        run: |
          cb --help
          cb --help | grep -q "usage:"

      - name: Test --packages
        run: |
          cb --packages
          cb --packages | grep -q "Available packages"

      - name: Test --setenv
        run: cb --setenv

      - name: Test --setenv --silent
        run: |
          output=$(cb --setenv --silent 2>&1)
          if [ -n "$output" ]; then
            echo "WARN: --setenv --silent produced output: $output"
          fi

      - name: Create a new project (Gradle)
        run: |
          mkdir -p /tmp/test-projects && cd /tmp/test-projects
          cb --new 1 my-test-project my.rootpackage.name my my "The test project."
          test -f /tmp/test-projects/my-test-project/build.gradle || test -f /tmp/test-projects/my-test-project/settings.gradle

  #######################################################################
  # Linux - package installation (matrix)
  #######################################################################
  test-linux-packages:
    runs-on: ubuntu-latest
    needs: test-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: java
            verify_current: true
          - package: gradle
            verify_current: true
          - package: maven
            verify_current: true
          - package: node
            verify_current: true
          - package: ant
            verify_current: true
          - package: groovy
            verify_current: true
          - package: python
            verify_current: true
          - package: trivy
            verify_current: true
          - package: micronaut
            verify_current: true
          - package: sbt
            verify_current: true
          - package: btrace
            verify_current: true
          - package: jmeter
            verify_current: true
          - package: squirrel
            verify_current: true
          - package: gaiden
            verify_current: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: chmod -R +x bin/

      - name: Install common-build
        run: |
          bash bin/cb-install
          CB_HOME=$(ls -d $HOME/devtools/toolarium-common-build-* | head -1)
          echo "CB_HOME=$CB_HOME" >> $GITHUB_ENV
          echo "CB_DEVTOOLS=$(dirname $CB_HOME)" >> $GITHUB_ENV
          echo "$CB_HOME/bin" >> $GITHUB_PATH

      - name: Install ${{ matrix.package }}
        run: |
          cb --install ${{ matrix.package }} --default

      - name: Verify ${{ matrix.package }} installed
        run: |
          if [ "${{ matrix.verify_current }}" = "true" ]; then
            echo "Checking $CB_HOME/current/${{ matrix.package }}..."
            test -d "$CB_HOME/current/${{ matrix.package }}" || test -L "$CB_HOME/current/${{ matrix.package }}"
            echo "OK: ${{ matrix.package }} installed in current/"
          fi

      - name: Verify ${{ matrix.package }} in --setenv
        if: matrix.verify_current
        run: |
          cb --setenv | grep -qi "${{ matrix.package }}"

  #######################################################################
  # Linux - large package installation
  #######################################################################
  test-linux-packages-large:
    runs-on: ubuntu-latest
    needs: test-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: eclipse
            verify_dir: eclipse-
          - package: intellij
            verify_dir: ideaIC-
          - package: visualvm
            verify_dir: visualvm-
          - package: flutter
            verify_dir: flutter-
          - package: vscode
            verify_dir: vscode-
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: chmod -R +x bin/

      - name: Install common-build
        run: |
          bash bin/cb-install
          CB_HOME=$(ls -d $HOME/devtools/toolarium-common-build-* | head -1)
          echo "CB_HOME=$CB_HOME" >> $GITHUB_ENV
          echo "CB_DEVTOOLS=$(dirname $CB_HOME)" >> $GITHUB_ENV
          echo "$CB_HOME/bin" >> $GITHUB_PATH

      - name: Install ${{ matrix.package }}
        run: |
          cb --install ${{ matrix.package }}

      - name: Verify ${{ matrix.package }} installed
        run: |
          echo "Checking for ${{ matrix.verify_dir }}* in $CB_DEVTOOLS..."
          ls -d $CB_DEVTOOLS/${{ matrix.verify_dir }}* 2>/dev/null
          test -n "$(ls -d $CB_DEVTOOLS/${{ matrix.verify_dir }}* 2>/dev/null)" || \
            test -n "$(ls -d $CB_DEVTOOLS/*${{ matrix.package }}* 2>/dev/null)"
          echo "OK: ${{ matrix.package }} installed"

  #######################################################################
  # Linux - build integration test
  #######################################################################
  test-linux-build:
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: chmod -R +x bin/

      - name: Install common-build
        run: |
          bash bin/cb-install
          CB_HOME=$(ls -d $HOME/devtools/toolarium-common-build-* | head -1)
          echo "CB_HOME=$CB_HOME" >> $GITHUB_ENV
          echo "$CB_HOME/bin" >> $GITHUB_PATH

      - name: Install java and gradle
        run: |
          cb --install java --default
          cb --install gradle --default

      - name: Verify tools via --setenv
        run: |
          output=$(cb --setenv 2>&1)
          echo "$output"
          echo "$output" | grep -q "Add java to path"
          echo "$output" | grep -q "Add gradle to path"

      - name: Create and build a Gradle project
        run: |
          mkdir -p /tmp/test-projects && cd /tmp/test-projects
          cb --new 1 my-test-project my.rootpackage.name my my "The test project."
          cd /tmp/test-projects/my-test-project
          cb

  #######################################################################
  # macOS - core tests and packages
  #######################################################################
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions
        run: chmod -R +x bin/

      - name: Install common-build
        run: |
          bash bin/cb-install
          CB_HOME=$(ls -d $HOME/devtools/toolarium-common-build-* | head -1)
          echo "CB_HOME=$CB_HOME" >> $GITHUB_ENV
          echo "CB_DEVTOOLS=$(dirname $CB_HOME)" >> $GITHUB_ENV
          echo "$CB_HOME/bin" >> $GITHUB_PATH

      - name: Test --version
        run: |
          cb --version
          cb --version | grep -q "toolarium common build"

      - name: Test --help
        run: |
          cb --help | grep -q "usage:"

      - name: Test --packages
        run: |
          cb --packages | grep -q "Available packages"

      - name: Test --setenv
        run: |
          cb --setenv

      - name: Install java
        run: |
          cb --install java --default
          test -d "$CB_HOME/current/java" || test -L "$CB_HOME/current/java"

      - name: Install gradle
        run: |
          cb --install gradle --default
          test -d "$CB_HOME/current/gradle" || test -L "$CB_HOME/current/gradle"

      - name: Install maven
        run: |
          cb --install maven --default
          test -d "$CB_HOME/current/maven" || test -L "$CB_HOME/current/maven"

      - name: Install node
        run: |
          cb --install node --default
          test -d "$CB_HOME/current/node" || test -L "$CB_HOME/current/node"

      - name: Install ant
        run: |
          cb --install ant --default
          test -d "$CB_HOME/current/ant" || test -L "$CB_HOME/current/ant"

      - name: Install groovy
        run: |
          cb --install groovy --default
          test -d "$CB_HOME/current/groovy" || test -L "$CB_HOME/current/groovy"

      - name: Install trivy
        run: |
          cb --install trivy --default
          test -d "$CB_HOME/current/trivy" || test -L "$CB_HOME/current/trivy"

      - name: Install micronaut
        run: |
          cb --install micronaut --default
          test -d "$CB_HOME/current/micronaut" || test -L "$CB_HOME/current/micronaut"

      - name: Install sbt
        run: |
          cb --install sbt --default
          test -d "$CB_HOME/current/sbt" || test -L "$CB_HOME/current/sbt"

      - name: Verify --setenv adds installed tools
        run: |
          output=$(cb --setenv 2>&1)
          echo "$output"
          echo "$output" | grep -q "Add java to path"
          echo "$output" | grep -q "Add gradle to path"
          echo "$output" | grep -q "Add maven to path"
          echo "$output" | grep -q "Add node to path"
          echo "$output" | grep -q "Add trivy to path"

      - name: Create and build a Gradle project
        run: |
          mkdir -p /tmp/test-projects && cd /tmp/test-projects
          cb --new 1 my-test-project my.rootpackage.name my my "The test project."
          cd /tmp/test-projects/my-test-project
          cb

  #######################################################################
  # Windows - core tests
  #######################################################################
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common-build
        shell: cmd
        run: |
          call bin\cb-install.bat
          echo CB_HOME=%CB_HOME%

      - name: Set CB_HOME
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('dir /b /ad "%USERPROFILE%\devtools\toolarium-common-build-*"') do set "CB_VERSION_DIR=%%i"
          set "CB_HOME=%USERPROFILE%\devtools\%CB_VERSION_DIR%"
          echo CB_HOME=%CB_HOME%>> %GITHUB_ENV%
          echo %CB_HOME%\bin>> %GITHUB_PATH%

      - name: Test --version
        shell: cmd
        run: |
          call cb --version
          call cb --version | findstr /C:"toolarium common build"

      - name: Test --help
        shell: cmd
        run: |
          call cb --help
          call cb --help | findstr /C:"usage:"

      - name: Test --packages
        shell: cmd
        run: |
          call cb --packages
          call cb --packages | findstr /C:"Available packages"

      - name: Test --setenv
        shell: cmd
        run: call cb --setenv

      - name: Test --setenv --silent
        shell: cmd
        run: call cb --setenv --silent

      - name: Create a new project (Gradle)
        shell: cmd
        run: |
          mkdir %TEMP%\test-projects
          cd %TEMP%\test-projects
          call cb --new 1 my-test-project my.rootpackage.name my my "The test project."
          if not exist "%TEMP%\test-projects\my-test-project" exit /b 1

  #######################################################################
  # Windows - package installation (matrix)
  #######################################################################
  test-windows-packages:
    runs-on: windows-latest
    needs: test-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: java
            verify: current\java
          - package: gradle
            verify: current\gradle
          - package: maven
            verify: current\maven
          - package: node
            verify: current\node
          - package: ant
            verify: current\ant
          - package: groovy
            verify: current\groovy
          - package: trivy
            verify: current\trivy
          - package: micronaut
            verify: current\micronaut
          - package: sbt
            verify: current\sbt
          - package: btrace
            verify: current\btrace
          - package: jmeter
            verify: current\jmeter
          - package: squirrel
            verify: current\squirrel
          - package: gaiden
            verify: current\gaiden
          - package: python
            verify: current\python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common-build
        shell: cmd
        run: call bin\cb-install.bat

      - name: Set CB_HOME
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('dir /b /ad "%USERPROFILE%\devtools\toolarium-common-build-*"') do set "CB_VERSION_DIR=%%i"
          set "CB_HOME=%USERPROFILE%\devtools\%CB_VERSION_DIR%"
          echo CB_HOME=%CB_HOME%>> %GITHUB_ENV%
          echo %CB_HOME%\bin>> %GITHUB_PATH%

      - name: Install ${{ matrix.package }}
        shell: cmd
        run: call cb --install ${{ matrix.package }} --default

      - name: Verify ${{ matrix.package }} installed
        shell: cmd
        run: |
          if not exist "%CB_HOME%\${{ matrix.verify }}" (
            echo FAILED: %CB_HOME%\${{ matrix.verify }} not found
            exit /b 1
          )
          echo OK: ${{ matrix.package }} installed

      - name: Verify ${{ matrix.package }} in --setenv
        shell: cmd
        run: call cb --setenv | findstr /I /C:"${{ matrix.package }}"

  #######################################################################
  # Windows - Windows-only packages
  #######################################################################
  test-windows-packages-winonly:
    runs-on: windows-latest
    needs: test-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: git
            verify_devtools: git-
          - package: npp
            verify_devtools: npp-
          - package: winmerge
            verify_devtools: winmerge-
          - package: multicommander
            verify_devtools: multicommander-
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common-build
        shell: cmd
        run: call bin\cb-install.bat

      - name: Set CB_HOME
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('dir /b /ad "%USERPROFILE%\devtools\toolarium-common-build-*"') do set "CB_VERSION_DIR=%%i"
          set "CB_HOME=%USERPROFILE%\devtools\%CB_VERSION_DIR%"
          set "CB_DEVTOOLS=%USERPROFILE%\devtools"
          echo CB_HOME=%CB_HOME%>> %GITHUB_ENV%
          echo CB_DEVTOOLS=%CB_DEVTOOLS%>> %GITHUB_ENV%
          echo %CB_HOME%\bin>> %GITHUB_PATH%

      - name: Install ${{ matrix.package }}
        shell: cmd
        run: call cb --install ${{ matrix.package }} --default

      - name: Verify ${{ matrix.package }} installed
        shell: cmd
        run: |
          dir "%CB_DEVTOOLS%\${{ matrix.verify_devtools }}*" >nul 2>nul
          if %ERRORLEVEL% NEQ 0 (
            echo FAILED: no ${{ matrix.verify_devtools }}* directory found in %CB_DEVTOOLS%
            dir "%CB_DEVTOOLS%"
            exit /b 1
          )
          echo OK: ${{ matrix.package }} installed

  #######################################################################
  # Windows - large packages
  #######################################################################
  test-windows-packages-large:
    runs-on: windows-latest
    needs: test-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: eclipse
            verify_devtools: eclipse-
          - package: intellij
            verify_devtools: ideaIC-
          - package: visualvm
            verify_devtools: visualvm-
          - package: vscode
            verify_devtools: VSCode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common-build
        shell: cmd
        run: call bin\cb-install.bat

      - name: Set CB_HOME
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('dir /b /ad "%USERPROFILE%\devtools\toolarium-common-build-*"') do set "CB_VERSION_DIR=%%i"
          set "CB_HOME=%USERPROFILE%\devtools\%CB_VERSION_DIR%"
          set "CB_DEVTOOLS=%USERPROFILE%\devtools"
          echo CB_HOME=%CB_HOME%>> %GITHUB_ENV%
          echo CB_DEVTOOLS=%CB_DEVTOOLS%>> %GITHUB_ENV%
          echo %CB_HOME%\bin>> %GITHUB_PATH%

      - name: Install ${{ matrix.package }}
        shell: cmd
        run: call cb --install ${{ matrix.package }}

      - name: Verify ${{ matrix.package }} installed
        shell: cmd
        run: |
          dir "%CB_DEVTOOLS%\${{ matrix.verify_devtools }}*" >nul 2>nul
          if %ERRORLEVEL% NEQ 0 (
            echo FAILED: no ${{ matrix.verify_devtools }}* found in %CB_DEVTOOLS%
            dir "%CB_DEVTOOLS%"
            exit /b 1
          )
          echo OK: ${{ matrix.package }} installed

  #######################################################################
  # Windows - build integration test
  #######################################################################
  test-windows-build:
    runs-on: windows-latest
    needs: test-windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common-build
        shell: cmd
        run: call bin\cb-install.bat

      - name: Set CB_HOME
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('dir /b /ad "%USERPROFILE%\devtools\toolarium-common-build-*"') do set "CB_VERSION_DIR=%%i"
          set "CB_HOME=%USERPROFILE%\devtools\%CB_VERSION_DIR%"
          echo CB_HOME=%CB_HOME%>> %GITHUB_ENV%
          echo %CB_HOME%\bin>> %GITHUB_PATH%

      - name: Install java and gradle
        shell: cmd
        run: |
          call cb --install java --default
          call cb --install gradle --default

      - name: Verify --setenv adds installed tools
        shell: cmd
        run: |
          call cb --setenv | findstr /C:"Add java to path"
          call cb --setenv | findstr /C:"Add gradle to path"

      - name: Create and build a Gradle project
        shell: cmd
        run: |
          mkdir %TEMP%\test-projects
          cd %TEMP%\test-projects
          call cb --new 1 my-test-project my.rootpackage.name my my "The test project."
          cd %TEMP%\test-projects\my-test-project
          call cb
