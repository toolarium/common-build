name: CB Test

on:
  workflow_dispatch:
    inputs:
      full_project_test:
        description: 'Run full project build tests (slow)'
        type: boolean
        default: false
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    # Nightly full build test (03:00 UTC)
    - cron: '0 3 * * *'

jobs:

  #######################################################################
  # Linux / macOS - shell test scripts (test/bin/*)
  #
  # All tools are installed via cb --install into a temp sandbox that
  # the test scripts create themselves — we do NOT install anything
  # into the workspace, nor do we use external setup-java/setup-node
  # actions.  This ensures that every test exercises the exact tool
  # versions controlled by conf/tool-version-default.properties.
  #######################################################################
  test-scripts-shell:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set executable permissions
        run: chmod -R +x bin/ test/bin/

      - name: cb-read-version-test
        run: test/bin/cb-read-version-test

      - name: cb-lock-unlock-test
        run: test/bin/cb-lock-unlock-test

      - name: cb-how-to-test
        run: test/bin/cb-how-to-test

      - name: cb-json-test
        run: test/bin/cb-json-test

      - name: cb-install-test
        run: test/bin/cb-install-test

      - name: cb-install-e2e-test
        env:
          CB_INSTALL_TEST_E2E: '1'
        run: test/bin/cb-install-e2e-test

      - name: cb-test
        run: test/bin/cb-test

      - name: cb-project-test (scaffold)
        run: test/bin/cb-project-test

      - name: cb-project-test (full build)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_project_test)
        env:
          CB_PROJECT_TEST_BUILD: '1'
          CB_PROJECT_TEST_NETWORK: '1'
        run: test/bin/cb-project-test

      - name: cb-update-custom-home-test
        run: test/bin/cb-update-custom-home-test


      - name: cb-clean-files-test
        run: test/bin/cb-clean-files-test

      - name: cb-version-filter-test
        run: test/bin/cb-version-filter-test

      - name: cb-cleanup-test
        run: test/bin/cb-cleanup-test

      - name: cb-filetail-test
        run: test/bin/cb-filetail-test

      - name: cb-open-ports-test
        run: test/bin/cb-open-ports-test

      - name: cb-dockterm-test
        run: test/bin/cb-dockterm-test

      - name: cb-meminfo-test
        run: test/bin/cb-meminfo-test

      - name: cb-hashcode-test
        run: test/bin/cb-hashcode-test


  #######################################################################
  # Windows - batch test scripts (test/bin/*.bat)
  #######################################################################
  test-scripts-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: cb-read-version-test.bat
        shell: cmd
        run: test\bin\cb-read-version-test.bat

      - name: cb-lock-unlock-test.bat
        shell: cmd
        run: test\bin\cb-lock-unlock-test.bat

      - name: cb-how-to-test.bat
        shell: cmd
        run: test\bin\cb-how-to-test.bat

      - name: cb-install-test.bat
        shell: cmd
        run: test\bin\cb-install-test.bat

      - name: cb-install-e2e-test.bat
        shell: cmd
        env:
          CB_INSTALL_TEST_E2E: '1'
        run: test\bin\cb-install-e2e-test.bat

      - name: cb-test.bat
        shell: cmd
        run: test\bin\cb-test.bat

      - name: cb-project-test.bat (scaffold)
        shell: cmd
        run: test\bin\cb-project-test.bat

      - name: cb-project-test.bat (full build)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full_project_test)
        shell: cmd
        env:
          CB_PROJECT_TEST_BUILD: '1'
          CB_PROJECT_TEST_NETWORK: '1'
        run: test\bin\cb-project-test.bat

      - name: cb-update-custom-home-test.bat
        shell: cmd
        run: test\bin\cb-update-custom-home-test.bat
        
      - name: cb-clean-files-test.bat
        shell: cmd
        run: test\bin\cb-clean-files-test.bat

      - name: cb-version-filter-test.bat
        shell: cmd
        run: test\bin\cb-version-filter-test.bat

      - name: cb-cleanup-test.bat
        shell: cmd
        run: test\bin\cb-cleanup-test.bat

      - name: cb-filetail-test.bat
        shell: cmd
        run: test\bin\cb-filetail-test.bat

      - name: cb-open-ports-test.bat
        shell: cmd
        run: test\bin\cb-open-ports-test.bat

      - name: cb-dockterm-test.bat
        shell: cmd
        run: test\bin\cb-dockterm-test.bat

      - name: cb-meminfo-test.bat
        shell: cmd
        run: test\bin\cb-meminfo-test.bat

      - name: cb-copysymlink-test.bat
        shell: cmd
        run: test\bin\cb-copysymlink-test.bat

      - name: cb-deltree-test.bat
        shell: cmd
        run: test\bin\cb-deltree-test.bat

      - name: cb-cleanpath-test.bat
        shell: cmd
        run: test\bin\cb-cleanpath-test.bat

      - name: cb-timestamp-test.bat
        shell: cmd
        run: test\bin\cb-timestamp-test.bat

      - name: cb-download-test.bat
        shell: cmd
        run: test\bin\cb-download-test.bat
